<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">MD-AF-UCR v0.11 target-speed Pareto</title>
  <desc id="desc">Scatter plot of target perplexity change versus exact speculative acceptance-length change for four non-carrier arms across three model pairs. The protected main arm is highlighted.</desc>
  <defs>
