<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">MD-AF-UCR v0.11 gate waterfall</title>
  <desc id="desc">The original strict radius failure remains fail, followed by a separate descriptive FP32 qualification and the six prospectively ordered scientific gates.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#36566f"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#143247" flood-opacity=".12"/></filter>
  </defs>
  <style>
    .bg { fill:#f7f9fa; }
    .panel { fill:#fff; stroke:#d7e0e5; stroke-width:1.5; }
    .title { font:800 28px system-ui,sans-serif; fill:#142838; }
    .subtitle { font:500 14px system-ui,sans-serif; fill:#617381; }
    .head { font:750 17px system-ui,sans-serif; fill:#1b3548; }
    .label { font:650 13px system-ui,sans-serif; fill:#304b5e; }
    .small { font:500 11.5px system-ui,sans-serif; fill:#617381; }
    .value { font:750 12.5px ui-monospace,monospace; fill:#173044; }
    .grid { stroke:#dce4e8; stroke-width:1; }
    .zero { stroke:#80909b; stroke-width:1.5; stroke-dasharray:5 4; }
    .badge { font:800 12px system-ui,sans-serif; letter-spacing:.05em; }
  </style>
  <rect class="bg" width="1200" height="640"/>
  <text x="54" y="58" class="title">Ordered gate waterfall and non-rescuing radius qualification</text>
<text x="54" y="84" class="subtitle">Later observations cannot rescue an earlier gate failure · seed 99 is the inferential unit</text>
<rect x="42" y="112" width="1116" height="120" rx="20" class="panel"/>
<rect x="70" y="140" width="310" height="66" rx="14" fill="#fde3e5" stroke="#c5525b"/>
<text x="92" y="166" class="badge" fill="#a93640">ORIGINAL V1 STRICT RADIUS · FAIL</text>
<text x="92" y="190" class="label">preserved failures: 37</text>
