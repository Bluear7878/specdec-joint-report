<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="460" viewBox="0 0 1040 460" role="img" aria-labelledby="title desc">
<title id="title">Diagonal exact AAL effects</title>
<desc id="desc">Joint target and draft checkpoint effects for single UCR and WCR across three pairs.</desc>
<style>
text{font-family:Inter,Arial,sans-serif;fill:#172033}
.title{font-size:25px;font-weight:750}.subtitle{font-size:14px;fill:#526078}
.axis{font-size:12px;fill:#667085}.label{font-size:14px;font-weight:650}
.grid{stroke:#d8dee9;stroke-width:1}.zero{stroke:#172033;stroke-width:1.6}
</style>
<rect width="1040" height="460" fill="#fbfcff"/>
<text x="38" y="45" class="title">Diagonal alone hides which side helped</text>
<text x="38" y="71" class="subtitle">joint target + draft checkpoint effect (candidate − carrier exact AAL)</text>
<line x1="170.00" x2="170.00" y1="98" y2="400" class="grid"/>
<text x="170.00" y="425" text-anchor="middle" class="axis">-0.08</text>
<line x1="360.00" x2="360.00" y1="98" y2="400" class="grid"/>
<text x="360.00" y="425" text-anchor="middle" class="axis">-0.04</text>
<line x1="550.00" x2="550.00" y1="98" y2="400" class="zero"/>
<text x="550.00" y="425" text-anchor="middle" class="axis">+0.00</text>
<line x1="740.00" x2="740.00" y1="98" y2="400" class="grid"/>
<text x="740.00" y="425" text-anchor="middle" class="axis">+0.04</text>
<line x1="930.00" x2="930.00" y1="98" y2="400" class="grid"/>
<text x="930.00" y="425" text-anchor="middle" class="axis">+0.08</text>
<text x="38" y="130" class="label">Single-domain UCR · GPT-2</text>
<line x1="550.00" x2="513.33" y1="125" y2="125" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
<circle cx="513.33" cy="125" r="7" fill="#2563eb"/>
<text x="501.33" y="129" text-anchor="end" class="label">-0.00772</text>
<text x="38" y="173" class="label">Single-domain UCR · OPT</text>
<line x1="550.00" x2="496.87" y1="168" y2="168" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
<circle cx="496.87" cy="168" r="7" fill="#f59e0b"/>
<text x="484.87" y="172" text-anchor="end" class="label">-0.01119</text>
<text x="38" y="216" class="label">Single-domain UCR · Pythia</text>
<line x1="550.00" x2="683.72" y1="211" y2="211" stroke="#10b981" stroke-width="7" stroke-linecap="round"/>
<circle cx="683.72" cy="211" r="7" fill="#10b981"/>
<text x="695.72" y="215" text-anchor="start" class="label">+0.02815</text>
<text x="38" y="259" class="label">Multi-domain WCR · GPT-2</text>
<line x1="550.00" x2="769.91" y1="254" y2="254" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
<circle cx="769.91" cy="254" r="7" fill="#2563eb"/>
<text x="781.91" y="258" text-anchor="start" class="label">+0.04630</text>
<text x="38" y="302" class="label">Multi-domain WCR · OPT</text>
<line x1="550.00" x2="486.09" y1="297" y2="297" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
<circle cx="486.09" cy="297" r="7" fill="#f59e0b"/>
<text x="474.09" y="301" text-anchor="end" class="label">-0.01345</text>
<text x="38" y="345" class="label">Multi-domain WCR · Pythia</text>
<line x1="550.00" x2="423.13" y1="340" y2="340" stroke="#10b981" stroke-width="7" stroke-linecap="round"/>
<circle cx="423.13" cy="340" r="7" fill="#10b981"/>
<text x="411.13" y="344" text-anchor="end" class="label">-0.02671</text>
<text x="38" y="448" class="subtitle">Only 1/3 diagonal effects are positive in each family.</text>
</svg>
